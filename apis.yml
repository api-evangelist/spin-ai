apis:
  - aid: spin-ai:spin-ai-spinone-api
    name: Spin.AI SpinOne API
    description: >-
      The SpinOne Public API provides programmatic access to SaaS data protection
      management. It enables reading, filtering, and updating the backup status of
      entities (users, groups, shared drives) across Google Workspace, Microsoft 365,
      Salesforce, and Slack. Authentication uses a custom SPIN_API key scheme combining
      an App ID and API Key from the SpinOne admin console.
    humanURL: https://spin.ai/help/gworkspace-administration/setting-up-public-api
