aid: spin-ai
name: Spin.AI
description: >-
  Spin.AI is a SaaS security platform providing data protection, ransomware detection,
  and compliance management for cloud applications including Google Workspace, Microsoft 365,
  Salesforce, and Slack. The SpinOne Public API enables programmatic integration for managing
  backup entity lifecycle across enterprise SaaS environments.
