naftiko: "1.0.0-alpha1"

info:
  label: "Spin.AI SpinOne API"
  description: >-
    Shared capability definition for the Spin.AI SpinOne Public API, providing
    access to entity management for SaaS data protection across Google Workspace,
    Microsoft 365, Salesforce, and Slack. Enables reading, filtering, and updating
    backup entity status.
  tags:
    - Spin AI
    - SaaS Security
    - Data Protection
    - Backup
    - Entity Management
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPIN_AI_APP_ID: SPIN_AI_APP_ID
      SPIN_AI_API_KEY: SPIN_AI_API_KEY

capability:
  consumes:
    - type: http
      namespace: spin-ai
      baseUri: https://apg-1.spin.ai
      description: "Spin.AI SpinOne SaaS data protection REST API"
      authentication:
        type: apikey
        key: Authorization
        value: "SPIN_API X-APP-ID={{SPIN_AI_APP_ID}},X-API-KEY={{SPIN_AI_API_KEY}}"
        placement: header
      resources:
        - name: entities-all
          path: /api/v1/integration/backup/entities/all
          description: "Retrieve all backup entities"
          operations:
            - name: get-all-entities
              method: GET
              description: "Retrieve all entities managed by SpinOne backup"
              inputParameters:
                - name: platform
                  in: query
                  type: string
                  required: false
                  description: "Filter by SaaS platform (google_workspace, microsoft_365, etc.)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: entities-filter
          path: /api/v1/integration/backup/entities/filter
          description: "Filter backup entities by criteria"
          operations:
            - name: filter-entities
              method: POST
              description: "Retrieve filtered entities by type, status, and platform"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  types: "{{tools.types}}"
                  statuses: "{{tools.statuses}}"
                  platforms: "{{tools.platforms}}"
                  search: "{{tools.search}}"
        - name: entity-status
          path: /api/v1/integration/backup/entity/status
          description: "Update entity backup status"
          operations:
            - name: update-entity-status
              method: POST
              description: "Update the backup status of one or more entities"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  entity_ids: "{{tools.entity_ids}}"
                  status: "{{tools.status}}"
                  reason: "{{tools.reason}}"

  exposes:
    - type: rest
      port: 8100
      namespace: spin-ai-rest
      resources:
        - path: /v1/entities
          name: entities
          description: "All backup entities"
          operations:
            - method: GET
              name: get-all-entities
              description: "Get all backup entities"
              call: "spin-ai.get-all-entities"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/entities/filter
          name: entities-filter
          description: "Filtered backup entities"
          operations:
            - method: POST
              name: filter-entities
              description: "Filter entities by criteria"
              call: "spin-ai.filter-entities"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/entities/status
          name: entity-status
          description: "Entity backup status management"
          operations:
            - method: POST
              name: update-entity-status
              description: "Update entity backup status"
              call: "spin-ai.update-entity-status"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: spin-ai-mcp
      transport: http
      tools:
        - name: get-all-entities
          description: "Retrieve all entities managed by SpinOne backup across all platforms"
          hints:
            readOnly: true
            openWorld: true
          call: "spin-ai.get-all-entities"
          outputParameters:
            - type: object
              mapping: "$."
        - name: filter-entities
          description: "Search and filter backup entities by type, status, or platform"
          hints:
            readOnly: true
            openWorld: false
          call: "spin-ai.filter-entities"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-entity-status
          description: "Update backup status (ACTIVE/ARCHIVED/DISABLED) for one or more entities"
          hints:
            readOnly: false
            idempotent: true
          call: "spin-ai.update-entity-status"
          outputParameters:
            - type: object
              mapping: "$."
